<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eBay Emoji Slot Sorter</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111820;
      --muted: #6f7680;
      --line: #d8dde3;
      --shadow: rgba(17, 24, 32, 0.14);

      --ebay-red: #e53238;
      --ebay-blue: #0064d2;
      --ebay-yellow: #f5af02;
      --ebay-green: #86b817;

      --item-height: 112px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(0, 100, 210, 0.08), transparent 36%),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      width: min(92vw, 520px);
      text-align: center;
      padding: 34px 28px 30px;
    }

    .logo {
      display: block;
      width: min(180px, 48vw);
      max-height: 82px;
      object-fit: contain;
      margin: 0 auto 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 6vw, 3.3rem);
      line-height: 1;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .machine {
      position: relative;
      width: min(100%, 390px);
      margin: 30px auto 24px;
      padding: 22px;
      border-radius: 34px;
      background: linear-gradient(180deg, #ffffff, #f1f3f5);
      border: 1px solid var(--line);
      box-shadow:
        0 24px 60px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .machine-top {
      display: flex;
      justify-content: center;
      gap: 9px;
      margin-bottom: 18px;
    }

    .light {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--line);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.14);
    }

    .light:nth-child(1) {
      background: var(--ebay-red);
    }

    .light:nth-child(2) {
      background: var(--ebay-blue);
    }

    .light:nth-child(3) {
      background: var(--ebay-yellow);
    }

    .light:nth-child(4) {
      background: var(--ebay-green);
    }

    .slot-frame {
      position: relative;
      height: 154px;
      padding: 20px;
      border-radius: 26px;
      background: linear-gradient(180deg, #2d333a, #111820);
      box-shadow:
        inset 0 4px 18px rgba(0, 0, 0, 0.55),
        0 1px 0 rgba(255, 255, 255, 0.9);
      overflow: hidden;
    }

    .slot-frame::before,
    .slot-frame::after {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      height: 38px;
      z-index: 4;
      pointer-events: none;
    }

    .slot-frame::before {
      top: 20px;
      background: linear-gradient(180deg, rgba(17, 24, 32, 0.96), rgba(17, 24, 32, 0));
    }

    .slot-frame::after {
      bottom: 20px;
      background: linear-gradient(0deg, rgba(17, 24, 32, 0.96), rgba(17, 24, 32, 0));
    }

    .slot-window {
      position: relative;
      height: var(--item-height);
      border-radius: 18px;
      background: #ffffff;
      overflow: hidden;
      box-shadow:
        inset 0 9px 14px rgba(0, 0, 0, 0.18),
        inset 0 -9px 14px rgba(0, 0, 0, 0.08);
    }

    .slot-window::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      transform: translateY(-50%);
      background: rgba(0, 100, 210, 0.18);
      z-index: 5;
      pointer-events: none;
    }

    .reel {
      will-change: transform;
      transform: translateY(0);
    }

    .reel-item {
      height: var(--item-height);
      display: grid;
      place-items: center;
      font-size: 4.8rem;
      line-height: 1;
      user-select: none;
    }

    .machine.spinning .light {
      animation: blink 280ms linear infinite alternate;
    }

    .machine.spinning .slot-frame {
      box-shadow:
        inset 0 4px 18px rgba(0, 0, 0, 0.55),
        0 0 0 3px rgba(0, 100, 210, 0.12),
        0 1px 0 rgba(255, 255, 255, 0.9);
    }

    @keyframes blink {
      from {
        opacity: 0.3;
        transform: scale(0.86);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 15px 30px;
      background: var(--ebay-blue);
      color: #ffffff;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(0, 100, 210, 0.22);
      transition:
        transform 180ms ease,
        opacity 180ms ease,
        box-shadow 180ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(0, 100, 210, 0.28);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
      box-shadow: none;
    }

    .secondary-button {
      background: #ffffff;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .secondary-button:hover {
      box-shadow: 0 10px 24px rgba(17, 24, 32, 0.08);
    }

    .result {
      min-height: 30px;
      margin-top: 20px;
      font-size: 1.12rem;
      color: var(--muted);
    }

    .result strong {
      color: var(--text);
      font-size: 1.3em;
    }

    @media (max-width: 420px) {
      .app {
        padding-left: 18px;
        padding-right: 18px;
      }

      .machine {
        padding: 18px;
      }

      .reel-item {
        font-size: 4.2rem;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <img
      class="logo"
      src="https://i.postimg.cc/52Tt4Lkh/EBay-logo.png"
      alt="eBay"
    />

    <h1>Emoji Spin</h1>
    <p>Spin to sort people into balanced groups.</p>

    <section class="machine" id="machine" aria-label="Emoji slot machine">
      <div class="machine-top" aria-hidden="true">
        <span class="light"></span>
        <span class="light"></span>
        <span class="light"></span>
        <span class="light"></span>
      </div>

      <div class="slot-frame">
        <div class="slot-window">
          <div class="reel" id="reel" aria-live="polite">
            <div class="reel-item">🐶</div>
          </div>
        </div>
      </div>
    </section>

    <div class="button-row">
      <button id="spinButton" type="button">Spin</button>
      <button id="resetButton" class="secondary-button" type="button">Reset</button>
    </div>

    <div class="result" id="result">Ready to spin</div>
  </main>

  <script>
    const emojis = ["🐶", "🦈", "🦉", "🐯"];
    const itemHeight = 112;

    const machine = document.getElementById("machine");
    const reel = document.getElementById("reel");
    const spinButton = document.getElementById("spinButton");
    const resetButton = document.getElementById("resetButton");
    const result = document.getElementById("result");

    let spinning = false;
    let emojiBag = [];
    let currentEmoji = "🐶";

    function shuffleArray(array) {
      const shuffled = [...array];

      for (let i = shuffled.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        const temporaryValue = shuffled[i];

        shuffled[i] = shuffled[randomIndex];
        shuffled[randomIndex] = temporaryValue;
      }

      return shuffled;
    }

    function refillEmojiBag() {
      emojiBag = shuffleArray(emojis);
    }

    function pickBalancedEmoji() {
      if (emojiBag.length === 0) {
        refillEmojiBag();
      }

      return emojiBag.pop();
    }

    function getRandomEmoji() {
      const randomIndex = Math.floor(Math.random() * emojis.length);
      return emojis[randomIndex];
    }

    function renderReel(sequence) {
      reel.innerHTML = "";

      sequence.forEach((emoji) => {
        const item = document.createElement("div");
        item.className = "reel-item";
        item.textContent = emoji;
        reel.appendChild(item);
      });
    }

    function settleReel(emoji) {
      reel.style.transition = "none";
      reel.style.transform = "translateY(0)";
      renderReel([emoji]);
      currentEmoji = emoji;
    }

    function buildSpinSequence(winner) {
      const sequence = [currentEmoji];
      const minimumItems = 28;
      const extraItems = Math.floor(Math.random() * 8);

      for (let i = 0; i < minimumItems + extraItems; i++) {
        sequence.push(getRandomEmoji());
      }

      sequence.push(winner);

      return sequence;
    }

    function spin() {
      if (spinning) return;

      spinning = true;
      spinButton.disabled = true;
      resetButton.disabled = true;
      result.textContent = "Spinning...";
      machine.classList.add("spinning");

      const winner = pickBalancedEmoji();
      const sequence = buildSpinSequence(winner);
      const finalIndex = sequence.length - 1;
      const spinDuration = 2600 + Math.floor(Math.random() * 650);

      renderReel(sequence);

      reel.style.transition = "none";
      reel.style.transform = "translateY(0)";

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          reel.style.transition = `transform ${spinDuration}ms cubic-bezier(0.12, 0.72, 0.08, 1)`;
          reel.style.transform = `translateY(-${finalIndex * itemHeight}px)`;
        });
      });

      window.setTimeout(() => {
        settleReel(winner);

        machine.classList.remove("spinning");
        result.innerHTML = `You landed on <strong>${winner}</strong>`;

        spinButton.disabled = false;
        resetButton.disabled = false;
        spinning = false;
      }, spinDuration + 120);
    }

    function resetApp() {
      if (spinning) return;

      refillEmojiBag();
      settleReel("🐶");

      result.textContent = "Ready to spin";
    }

    refillEmojiBag();
    settleReel(currentEmoji);

    spinButton.addEventListener("click", spin);
    resetButton.addEventListener("click", resetApp);
  </script>
</body>
</html>
